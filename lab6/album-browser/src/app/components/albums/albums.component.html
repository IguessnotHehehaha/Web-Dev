<div class="container">
  <h1>Albums</h1>

  <div *ngIf="loading()" class="loading">Loading albums...</div>

  <ul *ngIf="!loading()" class="album-list">
    <li *ngFor="let album of albums()" class="album-item">
      <a [routerLink]="['/albums', album.id]" class="album-link">
        <span class="album-id">{{ album.id }}</span>
        <span class="album-title">{{ album.title }}</span>
      </a>
      <button class="btn-delete" (click)="deleteAlbum(album.id)">Delete</button>
    </li>
  </ul>
</div>
