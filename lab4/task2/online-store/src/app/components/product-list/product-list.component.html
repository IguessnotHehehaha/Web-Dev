<header class="header">
  <h1>Online Store</h1>
  <p>Products from Kaspi.kz</p>
</header>

<main class="main">
  <ul class="grid" *ngIf="products.length > 0; else empty">
    <li *ngFor="let product of products">
      <app-product-card [product]="product"></app-product-card>
    </li>
  </ul>

  <ng-template #empty>
    <p>No products found.</p>
  </ng-template>
</main>
