<main class="main">
  <ul class="grid" *ngIf="visibleProducts.length > 0; else empty">
    <li *ngFor="let product of visibleProducts">
      <app-product-item
        [product]="product"
        (deleteProduct)="onDeleteProduct($event)">
      </app-product-item>
    </li>
  </ul>

  <ng-template #empty>
    <p class="empty">No products in this category.</p>
  </ng-template>
</main>
