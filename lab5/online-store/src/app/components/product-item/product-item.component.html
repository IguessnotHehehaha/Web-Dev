<article class="card">
  <img [src]="product.image" [alt]="product.name" class="product-image" />

  <h3 class="name">{{ product.name }}</h3>
  <p class="description">{{ product.description }}</p>

  <div class="meta">
    <span class="price">{{ product.price | number:'1.0-0' }} ₸</span>
    <span class="rating">⭐ {{ product.rating }}</span>
    <span class="likes">❤ {{ product.likes }}</span>
  </div>

  <div class="actions">
    <a [href]="product.link" target="_blank" rel="noopener noreferrer" class="btn btn-open">Open on Kaspi.kz</a>
    <button type="button" class="btn btn-like" (click)="like()">Like</button>
    <button type="button" class="btn btn-delete" (click)="delete()">Delete</button>
    <button type="button" class="btn btn-whatsapp" (click)="shareOnWhatsApp()">WhatsApp</button>
    <button type="button" class="btn btn-telegram" (click)="shareOnTelegram()">Telegram</button>
  </div>
</article>
