<header class="header">
  <h1>Online Store</h1>
  <p>Products from Kaspi.kz</p>

  <div class="categories">
    <button
      *ngFor="let category of categories"
      (click)="selectCategory(category.id)"
      [class.active]="selectedCategoryId === category.id">
      {{ category.name }}
    </button>
  </div>

  <div class="filter-buttons" *ngIf="selectedCategoryId !== null">
    <button 
      (click)="toggleMaxRating()"
      [class.active]="showMaxRatingOnly"
      class="max-rating-btn">
      {{ showMaxRatingOnly ? 'Show Top Rated Only' : 'Show All Products' }}
    </button>
  </div>
</header>

<div class="container">
  <p *ngIf="selectedCategoryId === null" class="welcome">
    Select a category to view products.
  </p>

  <app-product-list
    *ngIf="selectedCategoryId !== null"
    [products]="selectedProducts">
  </app-product-list>
</div>
